<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanOps V7.3.1.2.1 — Workflow Category Separation</title>
<meta name="theme-color" content="#16824f">
<style>
:root{--green:#16824f;--dark:#0e653b;--soft:#f3faf6;--bg:#f5f8f6;--text:#17251e;--muted:#66746d;--line:#dfe9e3;--warn:#b54708;--danger:#b42318;--shadow:0 12px 28px rgba(24,45,34,.10)}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f8fbf8,#edf6f1);color:var(--text)}
.hidden{display:none!important} button,input,select,textarea{font-family:inherit} button{cursor:pointer}
.logo-img{width:100%;height:100%;object-fit:contain;display:block}
.logo-box-login{width:190px;height:170px;margin:0 auto 8px}
.logo-box-header{width:210px;height:180px;margin:0 auto}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
.login-card{width:min(440px,94vw);background:#fff;border-radius:30px;padding:28px;box-shadow:var(--shadow);border:1px solid var(--line)}
.center{text-align:center} h1,h2,h3{margin:0 0 8px} p{margin:5px 0} .small{font-size:13px;color:var(--muted)} label{display:block;margin:15px 0 7px;font-weight:800}
select,input,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:15px;background:#fff;font-size:16px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,130,79,.12)}
.pin-row{display:grid;grid-template-columns:1fr auto;gap:10px} .icon-btn{width:54px;height:54px;border:1px solid var(--line);border-radius:16px;background:#f8fbf9;color:var(--green);font-weight:900;font-size:18px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px} .key{border:1px solid var(--line);background:#fbfdfb;border-radius:16px;padding:15px 0;font-size:20px;font-weight:900;color:#183326} .key:active{background:var(--soft);transform:scale(.98)}
.btn{border:0;border-radius:16px;padding:15px 16px;font-weight:900;background:var(--green);color:#fff;font-size:16px} .btn:hover{background:var(--dark)} .btn.full{width:100%} .btn.secondary{background:#eef6f1;color:var(--green)} .btn.warn{background:#fff4e8;color:var(--warn)} .btn.danger{background:#fff1f0;color:var(--danger)}
.app{max-width:1120px;margin:0 auto;padding:14px}
.header{background:#fff;border-radius:28px;box-shadow:var(--shadow);border:1px solid var(--line);padding:20px 24px;display:grid;grid-template-columns:245px 1fr 180px;gap:22px;align-items:center;min-height:210px}
.brand{text-align:center} .brand h1{font-size:28px;margin-bottom:6px;line-height:1.18} .powered{color:var(--muted);font-weight:700;font-size:17px} .datetime{font-size:13px;color:var(--muted);margin-top:8px}
.userbox{text-align:right} .user-pill{background:#e7f4e9;border-radius:14px;padding:13px;font-weight:900;text-align:center;margin-bottom:10px}
.card{background:#fff;border-radius:24px;border:1px solid var(--line);box-shadow:var(--shadow);padding:22px;margin-top:14px}
.tabs{display:flex;gap:8px;margin-top:14px} .tab{flex:1;border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px;font-weight:900} .tab.active{background:var(--green);color:#fff;border-color:var(--green)}
.segment{display:flex;gap:10px;margin:12px 0} .segment button{flex:1;border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px;font-weight:900} .segment button.active{background:var(--green);color:#fff;border-color:var(--green)}
.status-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px} .status{border:2px solid var(--line);border-radius:16px;padding:14px;text-align:center;font-weight:900;background:#fff} .status.on{border-color:var(--green);background:var(--soft);color:var(--green)}
.details-box{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden;margin-top:12px} .details-head{width:100%;border:0;background:#f8fbf9;padding:15px;display:flex;align-items:center;justify-content:space-between;font-weight:900;color:var(--text)} .count{background:var(--soft);color:var(--green);border-radius:999px;padding:5px 9px;font-size:12px}
.details-body{padding:14px;border-top:1px solid var(--line)} .checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px} .check{border:2px solid var(--line);background:#fff;border-radius:15px;padding:12px;text-align:center;font-weight:900} .check.on{border-color:var(--green);background:var(--soft);color:var(--green)}
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-top:14px} .metric{border:1px solid var(--line);border-radius:18px;background:#fbfdfb;padding:16px} .metric strong{display:block;font-size:28px;color:var(--green);margin-top:4px}
.entry{border:1px solid var(--line);border-left:6px solid var(--green);border-radius:18px;padding:14px;margin:10px 0;background:#fff} .entry.issue{border-left-color:var(--warn)} .entry-title{font-size:17px;font-weight:900} .badge{display:inline-block;padding:6px 9px;border-radius:999px;background:var(--soft);color:var(--green);font-size:12px;font-weight:900;margin:4px 4px 0 0} .badge.issue{background:#fff4e8;color:var(--warn)}
.staff-list{display:grid;gap:10px;margin-top:12px} .staff-card{border:1px solid var(--line);border-radius:16px;padding:13px;background:#fbfdfb;display:flex;justify-content:space-between;gap:12px;align-items:center} .pin-badge{background:#eef6f1;color:#145c39;border-radius:999px;padding:7px 10px;font-weight:900;font-size:13px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#133b29;color:#fff;padding:13px 18px;border-radius:999px;font-weight:900;box-shadow:var(--shadow);display:none;z-index:99}
.footer{text-align:center;color:var(--muted);font-size:13px;padding:18px}
@media(max-width:760px){.login-card{padding:22px;border-radius:26px}.logo-box-login{width:170px;height:155px}.header{grid-template-columns:1fr;text-align:center;padding:20px 18px;gap:10px;min-height:auto}.logo-box-header{width:185px;height:165px}.userbox{text-align:center}.tabs{overflow:auto}.tab{min-width:120px}.status-row{grid-template-columns:1fr}}

.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.setup-list{display:grid;gap:10px;margin-top:12px}
.setup-card{border:1px solid var(--line);border-radius:16px;padding:13px;background:#fbfdfb;display:flex;justify-content:space-between;gap:12px;align-items:center}
.add-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn.smallbtn{padding:9px 11px;font-size:13px;border-radius:12px}
@media(max-width:760px){.setup-grid,.add-row{grid-template-columns:1fr}}


.photo-preview{margin-top:10px;max-width:230px;border-radius:14px;border:1px solid var(--line);display:block}
.photo-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.photo-label{border:1px solid var(--line);background:#fbfdfb;border-radius:16px;padding:15px;font-weight:900;text-align:center;color:var(--green)}
.file-input{display:none}
.btn.smallbtn{padding:9px 11px;font-size:13px;border-radius:12px}
@media print{.tabs,.btn,.keypad,.login-wrap{display:none!important}.card,.header{box-shadow:none}body{background:#fff}}
</style>
</head>
<body>

<section id="loginScreen" class="login-wrap">
<div class="login-card">
<div class="logo-box-login"><img class="logo-img" src="data:image/svg+xml;charset=UTF-8,%3Csvg%20viewBox%3D%220%200%20280%20245%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20aria-label%3D%22CleanOps%20Logo%22%3E%0A%3Cdefs%3E%0A%3ClinearGradient%20id%3D%22g1%22%20x1%3D%220%22%20x2%3D%221%22%20y1%3D%220%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%236fbe44%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%230d7a4a%22/%3E%3C/linearGradient%3E%0A%3ClinearGradient%20id%3D%22g2%22%20x1%3D%220%22%20x2%3D%221%22%20y1%3D%220%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%2316a05d%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%232b76b9%22/%3E%3C/linearGradient%3E%0A%3C/defs%3E%0A%3Cpath%20d%3D%22M55%2098%20L138%2035%20L225%2098%22%20fill%3D%22none%22%20stroke%3D%22url%28%23g1%29%22%20stroke-width%3D%2215%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%0A%3Cpath%20d%3D%22M74%20100%20V168%20H118%20V122%20H158%20V168%20H204%20V100%22%20fill%3D%22none%22%20stroke%3D%22%230e7848%22%20stroke-width%3D%2213%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%0A%3Cpath%20d%3D%22M95%20107%20L137%20151%20L211%2062%22%20fill%3D%22none%22%20stroke%3D%22url%28%23g2%29%22%20stroke-width%3D%2222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%0A%3Crect%20x%3D%22139%22%20y%3D%2276%22%20width%3D%2213%22%20height%3D%2213%22%20fill%3D%22%230e7848%22/%3E%3Crect%20x%3D%22156%22%20y%3D%2276%22%20width%3D%2213%22%20height%3D%2213%22%20fill%3D%22%230e7848%22/%3E%3Crect%20x%3D%22139%22%20y%3D%2293%22%20width%3D%2213%22%20height%3D%2213%22%20fill%3D%22%230e7848%22/%3E%3Crect%20x%3D%22156%22%20y%3D%2293%22%20width%3D%2213%22%20height%3D%2213%22%20fill%3D%22%230e7848%22/%3E%0A%3Cpath%20d%3D%22M91%2030%20l5%2013%2013%205-13%205-5%2013-5-13-13-5%2013-5z%22%20fill%3D%22%23f6d23f%22/%3E%3Cpath%20d%3D%22M211%2020%20l4%2010%2010%204-10%204-4%2010-4-10-10-4%2010-4z%22%20fill%3D%22%23f6d23f%22/%3E%0A%3Ctext%20x%3D%22140%22%20y%3D%22213%22%20text-anchor%3D%22middle%22%20font-size%3D%2247%22%20font-weight%3D%22800%22%20font-family%3D%22Arial%22%3E%3Ctspan%20fill%3D%22%230e7848%22%3EClean%3C/tspan%3E%3Ctspan%20fill%3D%22%232b76b9%22%3EOps%3C/tspan%3E%3C/text%3E%0A%3Ctext%20x%3D%22140%22%20y%3D%22238%22%20text-anchor%3D%22middle%22%20font-size%3D%2216%22%20font-weight%3D%22700%22%20fill%3D%22%235e6e66%22%20font-family%3D%22Arial%22%3EHospitality%20Management%3C/text%3E%0A%3C/svg%3E" alt="CleanOps logo"></div>
<div class="center"><h1>CleanOps Login</h1><p class="small">Hospitality Management · Daily Operations</p></div>
<label>Staff Name</label><select id="loginUser"></select>
<label>PIN</label><div class="pin-row"><input id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="Enter PIN" autocomplete="off"><button class="icon-btn" onclick="clearPin()">⌫</button></div>
<div class="keypad">
<button class="key" onclick="tapPin('1')">1</button><button class="key" onclick="tapPin('2')">2</button><button class="key" onclick="tapPin('3')">3</button>
<button class="key" onclick="tapPin('4')">4</button><button class="key" onclick="tapPin('5')">5</button><button class="key" onclick="tapPin('6')">6</button>
<button class="key" onclick="tapPin('7')">7</button><button class="key" onclick="tapPin('8')">8</button><button class="key" onclick="tapPin('9')">9</button>
<button class="key" onclick="backspacePin()">←</button><button class="key" onclick="tapPin('0')">0</button><button class="key" onclick="login()">✓</button>
</div>
<button class="btn full" style="margin-top:14px" onclick="login()">Login</button>
</div>
</section>

<main id="app" class="app hidden">
<header class="header">
<div class="logo-box-header"><img class="logo-img" src="data:image/svg+xml;charset=UTF-8,%3Csvg%20viewBox%3D%220%200%20280%20245%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20aria-label%3D%22CleanOps%20Logo%22%3E%0A%3Cdefs%3E%0A%3ClinearGradient%20id%3D%22g1%22%20x1%3D%220%22%20x2%3D%221%22%20y1%3D%220%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%236fbe44%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%230d7a4a%22/%3E%3C/linearGradient%3E%0A%3ClinearGradient%20id%3D%22g2%22%20x1%3D%220%22%20x2%3D%221%22%20y1%3D%220%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%2316a05d%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%232b76b9%22/%3E%3C/linearGradient%3E%0A%3C/defs%3E%0A%3Cpath%20d%3D%22M55%2098%20L138%2035%20L225%2098%22%20fill%3D%22none%22%20stroke%3D%22url%28%23g1%29%22%20stroke-width%3D%2215%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%0A%3Cpath%20d%3D%22M74%20100%20V168%20H118%20V122%20H158%20V168%20H204%20V100%22%20fill%3D%22none%22%20stroke%3D%22%230e7848%22%20stroke-width%3D%2213%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%0A%3Cpath%20d%3D%22M95%20107%20L137%20151%20L211%2062%22%20fill%3D%22none%22%20stroke%3D%22url%28%23g2%29%22%20stroke-width%3D%2222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%0A%3Crect%20x%3D%22139%22%20y%3D%2276%22%20width%3D%2213%22%20height%3D%2213%22%20fill%3D%22%230e7848%22/%3E%3Crect%20x%3D%22156%22%20y%3D%2276%22%20width%3D%2213%22%20height%3D%2213%22%20fill%3D%22%230e7848%22/%3E%3Crect%20x%3D%22139%22%20y%3D%2293%22%20width%3D%2213%22%20height%3D%2213%22%20fill%3D%22%230e7848%22/%3E%3Crect%20x%3D%22156%22%20y%3D%2293%22%20width%3D%2213%22%20height%3D%2213%22%20fill%3D%22%230e7848%22/%3E%0A%3Cpath%20d%3D%22M91%2030%20l5%2013%2013%205-13%205-5%2013-5-13-13-5%2013-5z%22%20fill%3D%22%23f6d23f%22/%3E%3Cpath%20d%3D%22M211%2020%20l4%2010%2010%204-10%204-4%2010-4-10-10-4%2010-4z%22%20fill%3D%22%23f6d23f%22/%3E%0A%3Ctext%20x%3D%22140%22%20y%3D%22213%22%20text-anchor%3D%22middle%22%20font-size%3D%2247%22%20font-weight%3D%22800%22%20font-family%3D%22Arial%22%3E%3Ctspan%20fill%3D%22%230e7848%22%3EClean%3C/tspan%3E%3Ctspan%20fill%3D%22%232b76b9%22%3EOps%3C/tspan%3E%3C/text%3E%0A%3Ctext%20x%3D%22140%22%20y%3D%22238%22%20text-anchor%3D%22middle%22%20font-size%3D%2216%22%20font-weight%3D%22700%22%20fill%3D%22%235e6e66%22%20font-family%3D%22Arial%22%3EHospitality%20Management%3C/text%3E%0A%3C/svg%3E" alt="CleanOps logo"></div>
<div class="brand"><h1>Karma Tara Residency</h1><div class="powered">Powered by CleanOps</div><div id="dateTime" class="datetime"></div></div>
<div class="userbox"><div id="userPill" class="user-pill"></div><button class="btn secondary full" onclick="logout()">Logout</button></div>
</header>

<div class="footer">🏠 Karma Tara Residency · Powered by CleanOps · V7.3.1.2</div>
</main>
<div id="toast" class="toast"></div>

<script>
const defaultUsers=[
  {name:"Sonam",role:"Admin",pin:"1234"},
  {name:"Amar",role:"Staff",pin:"1111"},
  {name:"Kul Bdr.",role:"Staff",pin:"2222"},
  {name:"Raman",role:"Supervisor",pin:"3333"}
];
let users=JSON.parse(localStorage.getItem("cleanops_v7312_users")||JSON.stringify(defaultUsers));
const defaultRooms=["Everest","Kanchenjunga","Lhotse","Makalu","Cho Oyu","Dhaulagiri","Manaslu","Annapurna","AmaDablam"];
let rooms=JSON.parse(localStorage.getItem("cleanops_v7312_rooms")||JSON.stringify(defaultRooms));
const defaultAreas=["Lobby","Reception","Rooftop","Stairway","Parking","Terrace","Common Bathroom"];
let areas=JSON.parse(localStorage.getItem("cleanops_v7312_areas")||JSON.stringify(defaultAreas));
const defaultSuiteTasks=["Change Bed Linen","Change Quilt Cover","Change Pillow Cover","Change Towels","Clean Kitchen","Clean Bathroom","Clean Living Room","Overall Cleaned"];
const defaultSuiteIssues=["Lights","TV","AC","Plumbing","Kitchen","Bathroom","Furniture","Other"];
const defaultAreaTasks=["Lobby Cleaning","Reception Cleaning","Rooftop Cleaning","Stairway Cleaning","Parking Cleaning","Terrace Cleaning","Garbage Collection"];
const defaultAreaIssues=["Lighting","Water Leakage","Furniture Damage","Waste Overflow","Floor Damage","Safety Hazard","Other"];
let suiteTasks=JSON.parse(localStorage.getItem("cleanops_v7312_suite_tasks")||JSON.stringify(defaultSuiteTasks));
let suiteIssues=JSON.parse(localStorage.getItem("cleanops_v7312_suite_issues")||JSON.stringify(defaultSuiteIssues));
let areaTasks=JSON.parse(localStorage.getItem("cleanops_v7312_area_tasks")||JSON.stringify(defaultAreaTasks));
let areaIssues=JSON.parse(localStorage.getItem("cleanops_v7312_area_issues")||JSON.stringify(defaultAreaIssues));
let entries=JSON.parse(localStorage.getItem("cleanops_v7312_entries")||"[]");
let currentUser=null,currentView="work",entryType="Suite Room";
let selectedMode=null,selectedStatus=[],selectedTask=[],selectedIssues=[],dropdownOpen=null;

function saveEntries(){
 localStorage.setItem("cleanops_v7312_entries",JSON.stringify(entries));
 localStorage.setItem("cleanops_v7312_rooms",JSON.stringify(rooms));
 localStorage.setItem("cleanops_v7312_areas",JSON.stringify(areas));
 localStorage.setItem("cleanops_v7312_users",JSON.stringify(users));
 localStorage.setItem("cleanops_v7312_suite_tasks",JSON.stringify(suiteTasks));
 localStorage.setItem("cleanops_v7312_suite_issues",JSON.stringify(suiteIssues));
 localStorage.setItem("cleanops_v7312_area_tasks",JSON.stringify(areaTasks));
 localStorage.setItem("cleanops_v7312_area_issues",JSON.stringify(areaIssues));
}
function fillUsers(){loginUser.innerHTML=users.map((u,i)=>`<option value="${i}">${u.name} — ${u.role}</option>`).join("")}
function showToast(m){toast.textContent=m;toast.style.display="block";setTimeout(()=>toast.style.display="none",1800)}
function tapPin(n){if(pin.value.length<4)pin.value+=n}
function backspacePin(){pin.value=pin.value.slice(0,-1)}
function clearPin(){pin.value=""}
function login(){const u=users[loginUser.value];if(!u||pin.value!==u.pin){showToast("Incorrect PIN");return}currentUser=u;sessionStorage.setItem("cleanops_v7312_user",JSON.stringify(u));pin.value="";startApp()}
function logout(){sessionStorage.removeItem("cleanops_v7312_user");currentUser=null;app.classList.add("hidden");loginScreen.classList.remove("hidden")}
function startApp(){loginScreen.classList.add("hidden");app.classList.remove("hidden");userPill.textContent=`${currentUser.name} — ${currentUser.role}`;currentView=currentUser.role==="Staff"?"work":"dashboard";tick();renderTabs();renderContent()}
function tick(){if(document.getElementById("dateTime")) dateTime.textContent=new Date().toLocaleDateString()+" | "+new Date().toLocaleTimeString()}
setInterval(tick,1000);
function todayEntries(){const d=new Date().toDateString();return entries.filter(e=>new Date(e.time).toDateString()===d)}
function hasIssue(e){return e.status.includes("Issue")||e.issues.length>0}
function renderTabs(){
 if(currentUser.role==="Staff"){tabs.innerHTML="";tabs.classList.add("hidden");return}
 tabs.classList.remove("hidden");
 const list=currentUser.role==="Supervisor"?[["dashboard","Dashboard"],["save","Save"]]:[["dashboard","Dashboard"],["staff","Staff & PINs"],["setup","Setup"],["save","Save"]];
 tabs.innerHTML=list.map(t=>`<button class="tab ${currentView===t[0]?'active':''}" onclick="go('${t[0]}')">${t[1]}</button>`).join("")
}
function go(v){currentView=v;renderTabs();renderContent()}
function renderContent(){
 if(currentView==="work") return renderWork();
 if(currentView==="dashboard") return renderDashboard();
 if(currentView==="reports") return renderReports(entries,"Live Operational Reports");
 if(currentView==="issues") return renderReports(entries.filter(hasIssue),"Issues");
 if(currentView==="staff") return renderStaff();
 if(currentView==="setup") return renderSetup();
 if(currentView==="save") return renderSave();
}
function resetEntry(){selectedMode=null;selectedStatus=[];selectedTask=[];selectedIssues=[];dropdownOpen=null}
function toggle(arr,val){const i=arr.indexOf(val);if(i>=0)arr.splice(i,1);else arr.push(val)}

function getCurrentTasks(){return entryType==="Suite Room"?suiteTasks:areaTasks}
function getCurrentIssues(){return entryType==="Suite Room"?suiteIssues:areaIssues}
function setStatus(mode){
 selectedMode=mode;
 selectedStatus=[mode];
 dropdownOpen=mode.toLowerCase();
 renderWork();
}
function stableToggleTask(item){
 const i=selectedTask.indexOf(item);
 if(i>=0) selectedTask.splice(i,1); else selectedTask.push(item);
 renderWork();

function previewPhoto(event){

function clearPhoto(){

function readPhoto(){

function setupBlock(title,type){

 </div>`;
}
function getSetupList(type){
 if(type==="rooms") return rooms;
 if(type==="areas") return areas;

}
